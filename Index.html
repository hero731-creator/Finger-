<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Animated Drawing</title>

<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:black;
}

canvas{
border:1px solid red;
}
</style>

</head>

<body>

<canvas id="c" width="600" height="700"></canvas>

<script>

const points=[
[-25,-180],
[-40,-75],
[-85,-45],
[-100,-15],
[-70,15],
[-25,-15],
[-25,30],
[5,30],
[5,0],
[5,180],
[20,200],
[35,180],
[35,-7],
[35,22],
[65,22],
[65,-22],
[65,7],
[87,7],
[95,-45],
[65,-180],
[-25,-180]
];

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

ctx.translate(300,350);

ctx.lineWidth=4;
ctx.strokeStyle="green";

let i=0;

function draw(){

if(i===0){
ctx.beginPath();
ctx.moveTo(
points[0][0],
-points[0][1]
);
}

if(i<points.length){

ctx.lineTo(
points[i][0],
-points[i][1]
);

ctx.stroke();

i++;

setTimeout(draw,100);

}

}

draw();




</script>

</body>
</html>
